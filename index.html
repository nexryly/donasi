<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dukung Kreativitas Kami</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #e0e0e0; text-align: center; padding: 40px 20px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: #1e1e1e; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #ffffff; margin-bottom: 10px; }
        
        /* Desain QR yang lebih menarik */
        .qris-wrapper {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            padding: 15px;
            border-radius: 20px;
            margin: 25px 0;
            box-shadow: 0 0 20px rgba(187, 134, 252, 0.2); /* Efek cahaya ungu tipis */
            border: 1px solid #333;
        }
        .qris-img { max-width: 100%; height: auto; border-radius: 10px; display: block; }
        
        .btn-copy { background-color: #bb86fc; color: #121212; padding: 12px 25px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-copy:hover { background-color: #9965f4; }
        p { color: #b0b0b0; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Terima Kasih! ✨</h1>
        <p>Dukungan Anda membantu saya untuk terus berkarya.</p>
        
        <div class="qris-wrapper">
            <img src="23762_3.jpg" alt="QRIS Toko Kisee" class="qris-img">
        </div>
        
        <p><strong>store Kisee</strong><br>ID1025463622114</p>
        
        <button class="btn-copy" onclick="navigator.clipboard.writeText('ID1025463622114'); alert('NMID Berhasil Disalin!')">Klik untuk Copy NMID</button>
        <p style="font-size: 0.85em; margin-top: 20px;">Scan QRIS melalui aplikasi perbankan atau e-wallet favorit Anda.</p>
    </div>
</body>
</html>
